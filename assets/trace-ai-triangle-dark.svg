<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520" viewBox="0 0 520 520">
<style>
  .edge { stroke: #ffffff; stroke-width: 5; fill: none; }
  .label { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 22px; fill: #ffffff; text-anchor: middle; }
  .center { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 20px; fill: #ffffff; text-anchor: middle; }
</style>
  <!-- Equilateral triangle: base 400, height ~346 -->
